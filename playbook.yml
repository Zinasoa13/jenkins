- name: Pull and Push Ubuntu 24.04
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    image_name: ubuntu
    image_tag: "24.04"
    dockerhub_repo: "{{ lookup('env', 'DOCKERHUB_USER') }}"
    build_tag: "{{ lookup('env', 'IMAGE_TAG') }}"

  pre_tasks:
    - name: Validate required environment variables
      ansible.builtin.fail:
        msg: "Required environment variable '{{ item.name }}' is not set or empty"
      when: item.value == ""
      loop:
        - { name: "DOCKERHUB_USER", value: "{{ dockerhub_repo }}" }
        - { name: "IMAGE_TAG",      value: "{{ build_tag }}" }

  tasks:
    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: "{{ lookup('env', 'DOCKERHUB_USER') }}"
        password: "{{ lookup('env', 'DOCKERHUB_PASS') }}"

    - name: Pull Ubuntu 24.04
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: "{{ image_tag }}"
        source: pull

    - name: Debug tagging info
      ansible.builtin.debug:
        msg: "Tagging {{ image_name }}:{{ image_tag }} as {{ dockerhub_repo }}/{{ image_name }}:{{ build_tag }}"

    - name: Tag and Push Ubuntu image to Docker Hub
      community.docker.docker_image:
        name: "{{ image_name }}:{{ image_tag }}"
        repository: "{{ dockerhub_repo }}/{{ image_name }}"
        tag: "{{ build_tag }}"
        source: local
        push: true

    - name: Run Trivy Security Scan
      community.docker.docker_container:
        name: trivy_scan
        image: aquasec/trivy
        state: started
        # auto_remove: false est important ici pour récupérer les logs après
        auto_remove: false
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        # On ne monte pas le cache pour l'instant pour éviter les soucis de permissions
        command: "image --severity HIGH,CRITICAL --exit-code 0 {{ dockerhub_repo }}/{{ image_name }}:{{ build_tag }}"
        detach: false
      register: scan_result
      ignore_errors: true # On ignore l'erreur ici pour pouvoir nettoyer le conteneur avant de faire échouer le build

    - name: Show Trivy output
      ansible.builtin.debug:
        msg: "{{ scan_result.container.Output }}"
      when: scan_result.container is defined

    - name: Remove Trivy container (Cleanup)
      community.docker.docker_container:
        name: trivy_scan
        state: absent

    - name: Log out from Docker Hub
      community.docker.docker_login:
        state: absent
