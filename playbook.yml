- name: Pull and Push Ubuntu 24.04
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    image_name: ubuntu
    image_tag: "24.04"
    dockerhub_repo: "{{ lookup('env','DOCKERHUB_USER')}}"
    build_tag: "{{ lookup('env','IMAGE_TAG') }}"            # Jenkins BUILD_ID

  tasks:

    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: "{{ lookup('env','DOCKERHUB_USER') }}"
        password: "{{ lookup('env','DOCKERHUB_PASS') }}"

    - name: Pull Ubuntu 24.04
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: "{{ image_tag }}"
        source: pull
    - debug:
        msg: "Tagging {{ image_name }}:{{ image_tag }} as {{ dockerhub_repo }}/{{ image_name }}:{{ build_tag }}"

    - name: Tag Ubuntu image with Jenkins BUILD_ID
      community.docker.docker_image:
        name: "{{ image_name }}:{{ image_tag }}"                # local image
        repository: "{{ dockerhub_repo }}/{{ image_name }}"     # target Docker Hub repo
        tag: "{{ build_tag }}"                                  # Jenkins BUILD_ID
        source: local                                          # use local image as base

    - name: Push Ubuntu image to Docker Hub
      community.docker.docker_image:
        name: "{{ dockerhub_repo }}/{{ image_name }}"
        tag: "{{ build_tag }}"
        push: yes
